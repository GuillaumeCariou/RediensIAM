rediensiam:

  # ── App image ─────────────────────────────────────────────────────────────────
  image:
    repository: rediensiam
    tag: "0.0.1"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
      ephemeral-storage: 1Gi
    limits:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 2Gi

  # ── App config ────────────────────────────────────────────────────────────────
  app:
    adminPath: "/admin"

  # ── Networking ────────────────────────────────────────────────────────────────
  service:
    public:
      port: 5000
    admin:
      port: 5001
      # Admin SPA is exposed ONLY via NodePort — no public ingress.
      # Access: direct on local network, or SSH tunnel from remote:
      #   ssh -L 30501:localhost:30501 user@server
      nodePort: 30501

  ingress:
    className: traefik
    public:
      enabled: true
      host: ""    # set in values.dev.yaml / values.prod.yaml
    admin:
      enabled: false    # keep false — NodePort only

  # ── SMTP (optional; per-org SMTP overrides this) ──────────────────────────────
  smtp:
    host: ""
    port: 587
    startTls: true
    username: ""
    fromAddress: "noreply@localhost"
    fromName: "RediensIAM"

  # ── Secrets — override via values.secret.yaml / values.prod.secret.yaml ───────
  # encryptionKey : 64-char hex — encrypts TOTP secrets, SMTP passwords, webhook secrets
  # databaseUrl   : full PostgreSQL connection string
  # cacheUrl      : full Redis/Dragonfly connection string
  secrets:
    encryptionKey: ""
    databaseUrl: ""
    cacheUrl: ""
    smtpPassword: ""
    bootstrapEmail: ""
    bootstrapPassword: ""

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    local:
      enabled: true
      image: postgres:16-alpine
      storage: 2Gi
      password: ""
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
          ephemeral-storage: 1Gi
        limits:
          cpu: 1000m
          memory: 1Gi
          ephemeral-storage: 2Gi

  # ── Dragonfly (Redis-compatible cache) ────────────────────────────────────────
  dragonfly:
    local:
      enabled: true
      image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.25.0
      password: ""
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
          ephemeral-storage: 100Mi
        limits:
          cpu: 500m
          memory: 512Mi
          ephemeral-storage: 500Mi

  # ── Hydra ─────────────────────────────────────────────────────────────────────
  hydra:
    local:
      enabled: true
    external:
      adminUrl: "http://rediensiam-hydra-admin:4445"
      publicUrl: "http://rediensiam-hydra-public:4444"

  # ── Keto ──────────────────────────────────────────────────────────────────────
  keto:
    local:
      enabled: true
    external:
      readUrl:  "http://rediensiam-keto-read:4466"
      writeUrl: "http://rediensiam-keto-write:4467"


# ══════════════════════════════════════════════════════════════════════════════
# Hydra subchart — shared config (URLs set in values.dev.yaml / values.prod.yaml)
# ══════════════════════════════════════════════════════════════════════════════
hydra:
  hydra:
    config:
      strategies:
        access_token: jwt
      secrets:
        system: []    # REQUIRED: set in values.secret.yaml / values.prod.secret.yaml
      log:
        level: info
        format: json
      serve:
        public:
          port: 4444
          host: "0.0.0.0"
          cors:
            enabled: true
            allowed_methods: [GET, POST]
            allowed_headers: [Authorization, Content-Type]
            exposed_headers: [Content-Type]
            allow_credentials: true
            max_age: 300
        admin:
          port: 4445
          host: "0.0.0.0"
    dev: false
    dangerousForceHttp: false
    automigration:
      enabled: true
      type: initContainer
  service:
    public: { type: ClusterIP, port: 4444 }
    admin:  { type: ClusterIP, port: 4445 }
  ingress:
    public:
      enabled: true
      className: traefik
    admin:
      enabled: false


# ══════════════════════════════════════════════════════════════════════════════
# Keto subchart — shared config
# ══════════════════════════════════════════════════════════════════════════════
keto:
  keto:
    config:
      namespaces:
        - { id: 0, name: System }
        - { id: 1, name: Organisations }
        - { id: 2, name: Projects }
        - { id: 3, name: UserLists }
      log:
        level: info
        format: json
      serve:
        read:  { port: 4466 }
        write: { port: 4467 }
    automigration:
      enabled: true
      type: initContainer
  service:
    read:  { type: ClusterIP, port: 4466 }
    write: { type: ClusterIP, port: 4467 }
