# ── Public URL (login SPA, Hydra issuer, user-facing endpoints) ──────────────
# dev:  http://localhost
# prod: https://auth.rediens.net
appUrl: "http://localhost"

# ── Admin SPA URL (NodePort / SSH tunnel / private ingress) ──────────────────
# dev:  http://localhost:30501
# prod: https://admin.rediens.net
adminUrl: "http://localhost:30501"

# ── RediensIAM ───────────────────────────────────────────────────────────────
image:
  repository: rediensiam
  tag: "0.0.1"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  public:
    port: 5000
  admin:
    port: 5001
    # NodePort 30501 is the ONLY external access point for the admin SPA (by design).
    # The public ingress no longer exposes /admin — access via:
    #   dev:  http://localhost:30501/admin/  (direct NodePort)
    #   ops:  kubectl port-forward svc/rediensiam-admin 30501:5001
    #   prod: SSH tunnel or private ingress (see adminIngress below)
    nodePort: 30501

# ── Optional private admin ingress (production only) ─────────────────────────
# Set adminIngress.enabled=true in values.prod-admin.yaml to expose the admin SPA
# via a private hostname (e.g. admin.rediens.net) with IP allowlist enforcement.
# Disabled by default — NodePort is sufficient for dev/staging.
adminIngress:
  enabled: false
  host: "admin.rediens.net"   # private DNS only — must not resolve on public internet

ingress:
  enabled: true
  className: traefik
  host: localhost

env:
  IAM_ADMIN_PATH: "/admin"

  # ── Ory stack — override to point at external (off-cluster) instances ───────
  # To use external Hydra: set hydra.enabled=false and override these two.
  Hydra__AdminUrl: "http://rediensiam-hydra-admin:4445"
  Hydra__PublicUrl: "http://rediensiam-hydra-public:4444"
  # To use external Keto: set keto.enabled=false and override these two.
  Keto__ReadUrl: "http://rediensiam-keto-read:4466"
  Keto__WriteUrl: "http://rediensiam-keto-write:4467"

  # ── Database — override to point at an external PostgreSQL instance ─────────
  # To use external DB: set postgres.enabled=false and set this in values.secret.yaml:
  #   ConnectionStrings__Default: "Host=db.example.com;Database=rediensiam;Username=iam;Password=..."
  # (the app uses EF Core and will auto-migrate on first start)

  # ── Cache — override to point at an external Redis/Dragonfly instance ───────
  # To use external cache: set dragonfly.enabled=false and set this in values.secret.yaml:
  #   Cache__ConnectionString: "redis.example.com:6379,password=..."

  # ── App ─────────────────────────────────────────────────────────────────────
  App__PublicUrl: "http://localhost"
  # Must match adminUrl above; also update hydra.hydra.config.serve.public.cors.allowed_origins
  App__AdminSpaOrigin: "http://localhost"
  App__Domain: "localhost"

  # ── SMTP — optional; per-org SMTP works without this ────────────────────────
  Smtp__Host: ""
  Smtp__Port: "587"
  Smtp__StartTls: "true"
  Smtp__Username: ""
  Smtp__FromAddress: "noreply@localhost"
  Smtp__FromName: "RediensIAM"

secrets: {}  # override via values.secret.yaml

resources:
  requests:
    cpu: 100m
    memory: 128Mi
    ephemeral-storage: 1Gi
  limits:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 2Gi

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgres:
  image: postgres:16-alpine
  password: ""  # override via values.secret.yaml
  storage: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 1Gi
    limits:
      cpu: 1000m
      memory: 1Gi
      ephemeral-storage: 2Gi

# ── Dragonfly ─────────────────────────────────────────────────────────────────
dragonfly:
  image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.25.0
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 100Mi
    limits:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 500Mi

# ── Hydra (subchart) ─────────────────────────────────────────────────────────
hydra:
  hydra:
    config:
      dsn: ""  # override via values.secret.yaml
      urls:
        self:
          issuer: "http://localhost"
        login: "http://localhost/login"
        consent: "http://localhost/auth/consent"
        logout: "http://localhost/auth/logout"
        post_logout_redirect: "http://localhost:30501/admin/"  # keep in sync with adminUrl
      strategies:
        access_token: jwt
      secrets:
        system: []  # override via values.secret.yaml
      log:
        level: info
        format: json
      serve:
        public:
          port: 4444
          host: "0.0.0.0"
          cors:
            enabled: true
            allowed_origins:
              - "http://localhost:30501"
            allowed_methods:
              - GET
              - POST
            allowed_headers:
              - Authorization
              - Content-Type
            exposed_headers:
              - Content-Type
            allow_credentials: true
            max_age: 300
        admin:
          port: 4445
          host: "0.0.0.0"
    dev: false
    dangerousForceHttp: false
    automigration:
      enabled: true
      type: initContainer
  service:
    public:
      type: ClusterIP
      port: 4444
    admin:
      type: ClusterIP
      port: 4445
  ingress:
    public:
      enabled: true
      className: traefik
      hosts:
        - host: localhost
          paths:
            - path: /oauth2
              pathType: Prefix
            - path: /.well-known
              pathType: Prefix
            - path: /userinfo
              pathType: Prefix
    admin:
      enabled: false

# ── Keto (subchart) ──────────────────────────────────────────────────────────
keto:
  keto:
    config:
      dsn: ""  # override via values.secret.yaml
      namespaces:
        - id: 0
          name: System
        - id: 1
          name: Organisations
        - id: 2
          name: Projects
        - id: 3
          name: UserLists
      log:
        level: info
        format: json
      serve:
        read:
          port: 4466
        write:
          port: 4467
    automigration:
      enabled: true
      type: initContainer
  service:
    read:
      type: ClusterIP
      port: 4466
    write:
      type: ClusterIP
      port: 4467
