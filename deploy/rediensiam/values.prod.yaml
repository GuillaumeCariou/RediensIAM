# ── Prod environment overrides ────────────────────────────────────────────────
# Layered on top of values.yaml. Secrets in values.prod.secret.yaml (gitignored).
# Admin SPA accessible via Tailscale mesh (100.64.0.3) — no public hostname.

rediensiam:
  publicUrl: "https://authentication.rediens.net"
  adminUrl:  "http://100.64.0.3"    # Tailscale IP — accessible from enrolled devices only

  ingress:
    admin:
      enabled: true
      host: "100.64.0.3"

  smtp:
    host: ""                             # set your SMTP server
    port: 587
    startTls: true
    username: ""                         # set your SMTP login
    fromAddress: "noreply@rediens.net"
    fromName: "Rediens"

hydra:
  hydra:
    dev: false
    dangerousForceHttp: false
    config:
      urls:
        self:
          issuer:              "https://authentication.rediens.net"
        login:                 "https://authentication.rediens.net/login"
        consent:               "https://authentication.rediens.net/auth/consent"
        logout:                "https://authentication.rediens.net/auth/logout"
        post_logout_redirect:  "http://100.64.0.3/admin/"
      serve:
        public:
          cors:
            enabled: true
            allowed_origins:
              - "http://100.64.0.3"
              - "http://localhost:30501"    # keep for local SSH fallback
