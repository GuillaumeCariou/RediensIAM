# ── Prod environment overrides ────────────────────────────────────────────────
# Layered on top of values.yaml. Secrets in values.prod.secret.yaml (gitignored).
# Admin SPA stays on NodePort 30501 — no public hostname.
# Access from outside: ssh -L 30501:localhost:30501 user@server

rediensiam:
  # Switch to https://authentication.rediens.net once DNS + SSL cert are configured
  publicUrl: "http://192.168.1.51"
  adminUrl:  "http://localhost:30501"    # NodePort — SSH tunnel only

  smtp:
    host: ""                             # set your SMTP server
    port: 587
    startTls: true
    username: ""                         # set your SMTP login
    fromAddress: "noreply@rediens.net"
    fromName: "Rediens"

hydra:
  hydra:
    dev: false
    dangerousForceHttp: true
    config:
      urls:
        self:
          issuer:              "http://192.168.1.51"
        login:                 "http://192.168.1.51/login"
        consent:               "http://192.168.1.51/auth/consent"
        logout:                "http://192.168.1.51/auth/logout"
        post_logout_redirect:  "http://localhost:30501/admin/"
      serve:
        public:
          cors:
            allowed_origins:
              - "http://localhost:30501"
              - "http://192.168.1.51:30501"
  ingress:
    public:
      hosts:
        - host: 192.168.1.51
          paths:
            - { path: /oauth2,      pathType: Prefix }
            - { path: /.well-known, pathType: Prefix }
            - { path: /userinfo,    pathType: Prefix }
