apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: rediensiam
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: public
              containerPort: 5000
            - name: admin
              containerPort: 5001
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: ConnectionStrings__Default
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: database-url
            - name: Cache__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: cache-url
            - name: Security__TotpEncryptionKey
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: totp-key
            - name: Security__Argon2Pepper
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: argon2-pepper
            - name: Smtp__Password
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: smtp-password
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
