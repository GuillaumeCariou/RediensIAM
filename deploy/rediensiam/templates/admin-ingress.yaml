{{- if .Values.rediensiam.ingress.admin.enabled }}
# Private admin ingress — internal access only (Tailscale or LAN).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-admin-internal
  namespace: {{ .Release.Namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: {{ .Values.rediensiam.ingress.className }}
  rules:
    - host: {{ include "rediensiam.ingressAdminHost" . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-admin
                port:
                  number: {{ .Values.rediensiam.service.admin.port }}
{{- end }}
