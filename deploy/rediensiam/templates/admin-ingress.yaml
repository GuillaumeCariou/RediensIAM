{{- if .Values.rediensiam.ingress.admin.enabled }}
# Private admin ingress — Tailscale only (auth.ts.rediens.net).
# HTTPS via cert-manager self-signed cert (browser warning on first visit).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-admin-internal
  namespace: {{ .Release.Namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: selfsigned
spec:
  ingressClassName: {{ .Values.rediensiam.ingress.className }}
  tls:
    - hosts:
        - {{ include "rediensiam.ingressAdminHost" . }}
      secretName: {{ .Release.Name }}-admin-tls
  rules:
    - host: {{ include "rediensiam.ingressAdminHost" . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-admin
                port:
                  number: {{ .Values.rediensiam.service.admin.port }}
{{- end }}
