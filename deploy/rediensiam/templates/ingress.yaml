{{- if .Values.rediensiam.ingress.public.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-public
  namespace: {{ .Release.Namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: {{ .Values.rediensiam.ingress.className }}
  rules:
    - host: {{ include "rediensiam.ingressPublicHost" . }}
      http:
        paths:
          # Hydra OIDC paths — listed before / so longest-prefix wins
          - path: /.well-known
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-hydra-public
                port:
                  number: 4444
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-hydra-public
                port:
                  number: 4444
          - path: /userinfo
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-hydra-public
                port:
                  number: 4444
          # rediensiam app — catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-public
                port:
                  number: {{ .Values.rediensiam.service.public.port }}
{{- end }}
