apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dragonfly
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-dragonfly
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dragonfly
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-dragonfly
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-dragonfly
    spec:
      containers:
        - name: dragonfly
          image: {{ .Values.dragonfly.image }}
          ports:
            - containerPort: 6379
          args: ["--logtostderr"]
