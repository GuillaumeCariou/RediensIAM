{{- if .Values.rediensiam.dragonfly.local.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dragonfly
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-dragonfly
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dragonfly
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-dragonfly
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-dragonfly
    spec:
      automountServiceAccountToken: false
      containers:
        - name: dragonfly
          image: {{ .Values.rediensiam.dragonfly.local.image }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          env:
            - name: DRAGONFLY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: dragonfly-password
          ports:
            - containerPort: 6379
          args: ["--logtostderr", "--requirepass=$(DRAGONFLY_PASSWORD)"]
          resources:
            {{- toYaml .Values.rediensiam.dragonfly.local.resources | nindent 12 }}
{{- end }}
